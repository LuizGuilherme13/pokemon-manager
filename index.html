<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/poke-card.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <header>
        <h1 id="page-title">PokéManager</h1>
        <div id="filter-container">
            <input type="text" id="search" placeholder="Search by name">
            <select id="types">
                <option value="all">All</option>
            </select>
        </div>
    </header>

    <main>
        <h2 id="my-favorites-title">
            <i class="material-icons">favorite</i>
            My Favorites
        </h2>

        <hr>

        <div id="my-favorites-content"></div>

        <h2 id="global-database-title">
            <i class="material-icons">storage</i>
            Global Database
        </h2>

        <hr>

        <div id="global-database-content"></div>
    </main>

    <footer>
        <div id="page">
            <div>
                <div id="current_count"></div> / <div id="total_count"></div>
            </div>
            <button id="next-page">
                <i class="material-icons">navigate_next</i>
            </button>
        </div>
    </footer>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
